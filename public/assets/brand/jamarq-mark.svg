<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">JAMARQ Digital mark</title>
  <desc id="desc">A precise cyan J and Q monogram built on a system grid.</desc>
  <defs>
